# Nextcloud AIO — reverse proxy site
# Domain: nextcloud.local
# AIO Apache backend: 127.0.0.1:11000
#
# Setup steps (run once as root):
#   mkcert -cert-file /etc/ssl/nextcloud.local.pem \
#          -key-file  /etc/ssl/private/nextcloud.local-key.pem \
#          nextcloud.local
#   cp /home/coreconduit/nextcloud-nginx.conf /etc/nginx/sites-available/nextcloud
#   ln -s /etc/nginx/sites-available/nextcloud /etc/nginx/sites-enabled/nextcloud
#   nginx -t && systemctl reload nginx

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nextcloud.local;

    ssl_certificate     /etc/ssl/nextcloud.local.pem;
    ssl_certificate_key /etc/ssl/private/nextcloud.local-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Required by Nextcloud
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:11000;

        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Port   $server_port;
        proxy_set_header X-Forwarded-Scheme $scheme;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header Accept-Encoding    "";
        proxy_set_header Host               $host;

        client_max_body_size    16G;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        proxy_connect_timeout   10s;
        proxy_buffering         off;
        proxy_request_buffering off;   # required for chunked uploads
    }
}

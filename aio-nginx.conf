# Nextcloud AIO admin interface
# Domain: aio.local (LAN only)
# Backend: mastercontainer HTTPS on 127.0.0.1:8090

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name aio.local;

    ssl_certificate     /etc/ssl/aio.local.pem;
    ssl_certificate_key /etc/ssl/private/aio.local-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass https://127.0.0.1:8090;
        proxy_ssl_verify off;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # WebSocket support (live container logs)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

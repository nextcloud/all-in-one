name: Runner Smoke Test

# Trigger manually from the Gitea UI (Actions tab → Run workflow),
# or automatically on pushes to main that touch runner/workflow config.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.gitea/workflows/test-runner.yml'
      - 'scripts/**.sh'
      - '.shellcheckrc'
      - 'renovate.json'

jobs:
  # ── 1. Basic host environment ──────────────────────────────────────────────
  host-info:
    name: Host environment
    runs-on: ubuntu-latest
    steps:
      - name: Runner identity
        run: |
          echo "Runner:  $RUNNER_NAME"
          echo "OS:      $(uname -sr)"
          echo "Arch:    $(uname -m)"
          echo "User:    $(whoami)"
          echo "Home:    $HOME"
          echo "CPUs:    $(nproc)"
          echo "Memory:  $(free -h | awk '/^Mem/{print $2}')"
          echo "Disk:    $(df -h / | awk 'NR==2{print $4 " free of " $2}')"

      - name: Gitea context
        run: |
          echo "Repository:  $GITEA_REPOSITORY"
          echo "Ref:         $GITEA_REF"
          echo "SHA:         $GITEA_SHA"
          echo "Actor:       $GITEA_ACTOR"
          echo "Server URL:  $GITEA_SERVER_URL"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify workspace
        run: |
          echo "Workspace: $GITEA_WORKSPACE"
          ls -la

  # ── 2. Matrix — verify labels resolve correctly ────────────────────────────
  matrix-labels:
    name: Label check (${{ matrix.label }})
    runs-on: ${{ matrix.label }}
    strategy:
      matrix:
        label: [ubuntu-latest, ubuntu-22.04, ubuntu-24.04]
      fail-fast: false
    steps:
      - name: Confirm label accepted
        run: echo "Running on label '${{ matrix.label }}' — OK"

  # ── 3. Shell toolchain ─────────────────────────────────────────────────────
  shell-tools:
    name: Shell toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Core utils
        run: |
          for cmd in bash curl wget git jq python3 openssl; do
            if command -v "$cmd" &>/dev/null; then
              echo "✓ $cmd $($cmd --version 2>&1 | head -1)"
            else
              echo "✗ $cmd — NOT FOUND"
            fi
          done

  # ── 4. ShellCheck static analysis ─────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck --version

      - name: Run shellcheck
        run: |
          mapfile -t scripts < <(find scripts/ -name "*.sh" | sort)

          if [[ ${#scripts[@]} -eq 0 ]]; then
            echo "No shell scripts found"
            exit 0
          fi

          echo "Checking ${#scripts[@]} script(s)..."
          shellcheck --severity=warning --format=gcc "${scripts[@]}"
          echo "✓ All scripts passed shellcheck"

  # ── 5. Renovate config validation ─────────────────────────────────────────
  renovate-config:
    name: Renovate config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          python3 -c "
          import json, sys
          try:
              json.load(open('renovate.json'))
              print('✓ renovate.json is valid JSON')
          except json.JSONDecodeError as e:
              print(f'✗ JSON parse error: {e}', file=sys.stderr)
              sys.exit(1)
          "

      - name: Check required fields and fileMatch
        run: |
          node -e "
          const fs = require('fs');
          const config = JSON.parse(fs.readFileSync('renovate.json', 'utf8'));
          const fail = (msg) => { console.error('✗ ' + msg); process.exit(1); };

          // Required top-level fields
          if (!config['\$schema'])  fail('Missing \$schema');
          if (!config.extends)      fail('Missing extends');

          // github-actions manager must declare fileMatch for .gitea/workflows/
          const patterns = config['github-actions']?.fileMatch;
          if (!patterns?.length)    fail('Missing github-actions.fileMatch');

          // Every declared pattern must be a valid regex
          for (const p of patterns) {
            try { new RegExp(p); }
            catch (e) { fail('Invalid regex in fileMatch: ' + p); }
          }

          // At least one pattern must match .gitea/workflows/*.yml paths
          const probes = [
            '.gitea/workflows/test-runner.yml',
            '.gitea/workflows/ci.yml',
          ];
          for (const probe of probes) {
            if (!patterns.some(p => new RegExp(p).test(probe))) {
              fail('No fileMatch pattern covers: ' + probe);
            }
          }

          // Patterns must NOT accidentally match .github/workflows/ (already handled separately)
          // — this is fine if they do, but emit a notice so it is explicit
          if (patterns.some(p => new RegExp(p).test('.github/workflows/ci.yml'))) {
            console.log('  notice: fileMatch also covers .github/workflows/ paths');
          }

          // packageRules entries must each have matchManagers
          const rules = config.packageRules ?? [];
          rules.forEach((rule, i) => {
            if (!rule.matchManagers) fail('packageRules[' + i + '] missing matchManagers');
          });

          console.log('✓ \$schema present');
          console.log('✓ extends present');
          console.log('✓ fileMatch patterns are valid regexes');
          console.log('✓ fileMatch covers .gitea/workflows/*.yml');
          console.log('✓ packageRules structure valid (' + rules.length + ' rule(s))');
          "

  # ── 6. Artifact round-trip ─────────────────────────────────────────────────
  artifact-upload:
    name: Artifact upload
    runs-on: ubuntu-latest
    steps:
      - name: Create test artifact
        run: |
          mkdir -p artifacts
          echo "Runner: $RUNNER_NAME"          > artifacts/runner-info.txt
          echo "Built:  $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> artifacts/runner-info.txt
          echo "SHA:    $GITEA_SHA"            >> artifacts/runner-info.txt
          cat artifacts/runner-info.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: runner-smoke-test
          path: artifacts/
          retention-days: 3

  artifact-download:
    name: Artifact download
    runs-on: ubuntu-latest
    needs: artifact-upload
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: runner-smoke-test
          path: downloaded/

      - name: Verify contents
        run: |
          echo "Downloaded files:"
          ls -la downloaded/
          cat downloaded/runner-info.txt

  # ── 7. Docker container job (skipped gracefully if Docker absent) ──────────
  container-job:
    name: Container job
    runs-on: ubuntu-latest
    # Remove this job or set SKIP_CONTAINER_JOBS=true in runner config
    # if the runner is in --no-docker (host-exec) mode.
    container:
      image: alpine:3.19
    steps:
      - name: Alpine environment
        run: |
          echo "Running inside container:"
          cat /etc/alpine-release
          uname -a

      - name: Install and use a tool
        run: |
          apk add --no-cache curl jq 2>/dev/null
          echo "curl: $(curl --version | head -1)"
          echo "jq:   $(jq --version)"

  # ── 8. Multi-step pipeline with env vars and conditionals ─────────────────
  pipeline:
    name: Multi-step pipeline
    runs-on: ubuntu-latest
    env:
      BUILD_ENV: test
      APP_VERSION: "0.0.1-smoke"
    steps:
      - uses: actions/checkout@v4

      - name: Set output variable
        id: meta
        run: |
          SHORT_SHA="${GITEA_SHA::7}"
          echo "short_sha=$SHORT_SHA" >> "$GITEA_OUTPUT"
          echo "Short SHA: $SHORT_SHA"

      - name: Use output from previous step
        run: echo "Build tag → ${{ steps.meta.outputs.short_sha }}-${{ env.BUILD_ENV }}"

      - name: Conditional step (always runs)
        if: always()
        run: echo "This step runs even if earlier steps fail"

      - name: Success marker
        run: echo "Pipeline complete ✓"

  # ── 9. Summary job — fails fast if any required job failed ────────────────
  summary:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [host-info, matrix-labels, shell-tools, shellcheck, renovate-config, artifact-download, pipeline]
    if: always()
    steps:
      - name: Check results
        run: |
          results='${{ toJson(needs) }}'
          echo "Job results:"
          echo "$results" | grep -o '"result":"[^"]*"' || true

          if echo "$results" | grep -q '"result":"failure"'; then
            echo "One or more jobs FAILED"
            exit 1
          fi
          echo "All required jobs passed ✓"
